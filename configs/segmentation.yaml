seed: 2026
stage: segmentation
data:
  manifest: examples/example_manifest.jsonl
  input_sequences:
    - t2wi
    - dwi_low
    - dwi_high
    - adc
    - in_phase
    - out_phase
    - pre_t1
    - virtual_lap
    - virtual_pvp
    - virtual_dp
model:
  architecture: swin_unetr_style_decoder
  output_labels:
    - background
    - liver
    - lesion
training:
  optimizer: adamw
  loss: dice
  batch_size: 4
  max_epochs: 3000
  learning_rate: 0.0003
  output_dir: outputs/segmentation
evaluation:
  iou_threshold: 0.3
  metrics:
    - dsc
    - hd95
    - recall
    - precision
