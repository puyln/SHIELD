model:
  target: shield.generation.cdm.mdn.models.diffusion.ddpm.MDDM
  params:
    linear_start: 0.0015
    linear_end: 0.0195
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: image
    cond_stage_key: None
    image_size: 1
    channels: 256
    cond_stage_trainable: false
    conditioning_key: none
    parameterization: x0
    unet_config:
      target: shield.generation.cdm.mdn.modules.diffusionmodules.latentmlp.SimpleMLP
      params:
        in_channels: 192
        time_embed_dim: 192
        model_channels: 1536
        bottleneck_channels: 1536
        out_channels: 192
        num_res_blocks: 12
    pretrained_enc_config:
      params:
        proj_dim: 192
        pretrained_enc_withproj: True
        pretrained_enc_path: null
